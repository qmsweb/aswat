<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انتظرونا قريبًا</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap');

        /* تصفير الهوامش الأساسية */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            overflow: hidden; /* لمنع ظهور أشرطة التمرير إذا لم يكن هناك داعٍ لها */
        }

        /* حاوية الخلفية وتوسيط العناصر */
        .background-container {
            background-image: url('images/cover-soon.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; /* التوسيط العمودي */
            align-items: center; /* التوسيط الأفقي */
            position: relative;
        }

        /* (اختياري) طبقة شفافة داكنة فوق الخلفية لإبراز النص والشعار في حال كانت الخلفية فاتحة */
        .background-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.3); /* يمكنك تعديل الشفافية أو حذف هذا الجزء */
            z-index: 1;
        }

        /* حاوية المحتوى (الشعار والنص) */
        .content {
            z-index: 2; /* ليكون المحتوى فوق طبقة الخلفية */
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* المسافة بين الشعار والنص */
            padding: 20px;
            opacity: 0; /* الشفافية 0 لتفعيل تأثير الظهور في الجافاسكربت */
            transition: opacity 1.5s ease-in-out; /* حركة الظهور التدريجي */
        }

        /* تنسيق الشعار وتجاوبه مع الشاشات */
        .logo {
            max-width: 80%; /* لا يتجاوز 80% من عرض الشاشة في الجوال */
            width: 300px; /* العرض الافتراضي في الشاشات الكبيرة */
            height: auto;
        }

        /* تنسيق النص */
        .coming-soon-text {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6); /* ظل خفيف للنص لزيادة الوضوح */
        }

        /* التوافق مع شاشات الهواتف المحمولة */
        @media (max-width: 768px) {
            .coming-soon-text {
                font-size: 1.8rem;
            }
            .logo {
                width: 220px;
            }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="content" id="mainContent">
            <img src="images/sawamet-logo.png" alt="الشعار" class="logo">
            <h1 class="coming-soon-text">انتظرونا قريبًا</h1>
        </div>
    </div>

    <script>
        // التأكد من تحميل الصفحة بالكامل قبل تنفيذ الكود
        document.addEventListener("DOMContentLoaded", function() {
            const content = document.getElementById("mainContent");
            
            // إضافة تأخير زمني بسيط (نصف ثانية) ثم إظهار المحتوى بتأثير ناعم
            setTimeout(() => {
                content.style.opacity = "1";
            }, 500);
        });
    </script>

</body>
</html>
