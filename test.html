<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توضيح المخرج الصوتي - صوامت</title>
    <style>
        /* تنسيقات عامة */
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #F8F9FA;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        input, button {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: inherit;
        }

        button {
            background-color: #7B2CBF;
            color: white;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5A189A;
        }

        /* الحاوية التي تضم الصورة والنتائج */
        .content-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 900px;
        }

        /* تنسيقات حاوية الرسم التوضيحي */
        .anatomy-container {
            background: #FFFFFF;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            width: 400px;
            max-width: 100%;
        }

        .anatomy-container h3 {
            color: #7B2CBF;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            display: inline-block;
        }

        .speech-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
        }

        /* تنسيق النقاط التفاعلية */
        .point {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: #DEE2E6;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
            z-index: 2;
        }

        .point .label {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #6C757D;
            background: rgba(255, 255, 255, 0.85);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .point.active {
            background-color: #38B000;
            box-shadow: 0 0 12px 4px rgba(56, 176, 0, 0.5);
            transform: translate(-50%, -50%) scale(1.3);
            z-index: 10;
        }

        .point.active .label {
            color: #38B000;
            font-weight: bold;
            font-size: 13px;
            top: -28px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* تنسيقات قسم النتائج النصية */
        #resultSection {
            background: #FFFFFF;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 400px;
            max-width: 100%;
            display: none; /* مخفي افتراضياً */
        }

        .char-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #F8F9FA;
        }

        #charDisplay {
            font-size: 40px;
            color: #7B2CBF;
            font-weight: bold;
            margin: 0;
        }

        #charName {
            color: #6C757D;
            margin: 5px 0 0 0;
        }

        .detail-card {
            background: #F8F9FA;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-title {
            font-weight: bold;
            color: #495057;
        }

        .detail-value {
            color: #212529;
        }

        .error-message {
            color: #D00000;
            text-align: center;
            padding: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="charInput" placeholder="أدخل حرفاً صامتاً..." maxlength="1" onkeypress="if(event.key === 'Enter') searchPhonetic()">
        <button onclick="searchPhonetic()">بحث وتوضيح المخرج</button>
    </div>

    <div class="content-wrapper">
        <div class="anatomy-container" id="anatomySection">
            <h3>المخرج على الجهاز النطقي</h3>
            <div class="image-wrapper">
                <img src="/images/speech.jpg" alt="المخارج الصوتية" class="speech-image">
                
                <div id="pt-lips" class="point" style="top: 48%; left: 12%;"><span class="label">شفوي</span></div>
                <div id="pt-teeth" class="point" style="top: 50%; left: 23%;"><span class="label">أسناني</span></div>
                <div id="pt-alveolar" class="point" style="top: 43%; left: 26%;"><span class="label">لثوي</span></div>
                <div id="pt-palatal" class="point" style="top: 32%; left: 45%;"><span class="label">غاري</span></div>
                <div id="pt-velar" class="point" style="top: 34%; left: 65%;"><span class="label">طبقي</span></div>
                <div id="pt-uvular" class="point" style="top: 45%; left: 70%;"><span class="label">لهوي</span></div>
                <div id="pt-pharyngeal" class="point" style="top: 65%; left: 75%;"><span class="label">حلقي</span></div>
                <div id="pt-glottal" class="point" style="top: 92%; left: 70%;"><span class="label">حنجري</span></div>
                <div id="pt-nasal" class="point" style="top: 20%; left: 40%;"><span class="label">الخيشوم</span></div>
            </div>
        </div>

        <div id="resultSection">
            <div class="char-header">
                <h2 id="charDisplay">-</h2>
                <h4 id="charName">-</h4>
            </div>
            <div id="resultDetails"></div>
        </div>
    </div>

    <script>
        // 1. بيانات الصوامت (محدثة وفق التوزيع الحديث للمخارج العشرة)
        const phoneticsData = {
            "أ": { "التسمية": "حرف الألف (الهمزة)", "المخرج": "حنجري", "طريقة النطق": "شديد (انفجاري)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت حنجري انفجاري مجهور" },
            "ب": { "التسمية": "حرف الباء", "المخرج": "شفوي", "طريقة النطق": "شديد (انفجاري)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت شفوي انفجاري مجهور" },
            "ت": { "التسمية": "حرف التاء", "المخرج": "أسناني لثوي", "طريقة النطق": "شديد (انفجاري)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت أسناني لثوي انفجاري مهموس" },
            "ث": { "التسمية": "حرف الثاء", "المخرج": "بين أسناني", "طريقة النطق": "رخو (احتكاكي)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت بين أسناني احتكاكي مهموس" },
            "ج": { "التسمية": "حرف الجيم", "المخرج": "غاري", "طريقة النطق": "شديد / رخو", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت غاري مجهور" },
            "ح": { "التسمية": "حرف الحاء", "المخرج": "حلقي", "طريقة النطق": "رخو (احتكاكي)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت حلقي احتكاكي مهموس" },
            "خ": { "التسمية": "حرف الخاء", "المخرج": "طبقي", "طريقة النطق": "رخو (احتكاكي)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت طبقي احتكاكي مهموس" },
            "د": { "التسمية": "حرف الدال", "المخرج": "أسناني لثوي", "طريقة النطق": "شديد (انفجاري)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت أسناني لثوي انفجاري مجهور" },
            "ذ": { "التسمية": "حرف الذال", "المخرج": "بين أسناني", "طريقة النطق": "رخو (احتكاكي)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت بين أسناني احتكاكي مجهور" },
            "ر": { "التسمية": "حرف الراء", "المخرج": "لثوي", "طريقة النطق": "تكراري", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت لثوي تكراري مجهور" },
            "ز": { "التسمية": "حرف الزاي", "المخرج": "أسناني لثوي", "طريقة النطق": "رخو (احتكاكي / صفير)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت أسناني لثوي احتكاكي مجهور (صفير)" },
            "س": { "التسمية": "حرف السين", "المخرج": "أسناني لثوي", "طريقة النطق": "رخو (احتكاكي / صفير)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت أسناني لثوي احتكاكي مهموس (صفير)" },
            "ش": { "التسمية": "حرف الشين", "المخرج": "غاري", "طريقة النطق": "رخو (متفشٍّ)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت غاري احتكاكي مهموس متفشٍّ" },
            "ص": { "التسمية": "حرف الصاد", "المخرج": "أسناني لثوي", "طريقة النطق": "رخو (احتكاكي / صفير)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "مطبق", "ملخَّص": "صوت أسناني لثوي احتكاكي مهموس مطبق (صفير)" },
            "ض": { "التسمية": "حرف الضاد", "المخرج": "أسناني لثوي", "طريقة النطق": "شديد (انفجاري)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "مطبق", "ملخَّص": "صوت أسناني لثوي انفجاري مجهور مطبق" },
            "ط": { "التسمية": "حرف الطاء", "المخرج": "أسناني لثوي", "طريقة النطق": "شديد (انفجاري)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "مطبق", "ملخَّص": "صوت أسناني لثوي انفجاري مجهور مطبق" },
            "ظ": { "التسمية": "حرف الظاء", "المخرج": "بين أسناني", "طريقة النطق": "رخو (احتكاكي)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "مطبق", "ملخَّص": "صوت بين أسناني احتكاكي مجهور مطبق" },
            "ع": { "التسمية": "حرف العين", "المخرج": "حلقي", "طريقة النطق": "رخو (احتكاكي)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت حلقي احتكاكي مجهور" },
            "غ": { "التسمية": "حرف الغين", "المخرج": "طبقي", "طريقة النطق": "رخو (احتكاكي)", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت طبقي احتكاكي مجهور" },
            "ف": { "التسمية": "حرف الفاء", "المخرج": "شفوي أسناني", "طريقة النطق": "رخو (احتكاكي)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت شفوي أسناني احتكاكي مهموس" },
            "ق": { "التسمية": "حرف القاف", "المخرج": "لهوي", "طريقة النطق": "شديد (انفجاري)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت لهوي انفجاري مهموس" },
            "ك": { "التسمية": "حرف الكاف", "المخرج": "طبقي", "طريقة النطق": "شديد (انفجاري)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت طبقي انفجاري مهموس" },
            "ل": { "التسمية": "حرف اللام", "المخرج": "لثوي", "طريقة النطق": "جانبي", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت لثوي جانبي مجهور" },
            "م": { "التسمية": "حرف الميم", "المخرج": "شفوي", "طريقة النطق": "أنفي", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت شفوي أنفي مجهور" },
            "ن": { "التسمية": "حرف النون", "المخرج": "أسناني لثوي", "طريقة النطق": "أنفي", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت أسناني لثوي أنفي مجهور" },
            "ه": { "التسمية": "حرف الهاء", "المخرج": "حنجري", "طريقة النطق": "رخو (احتكاكي)", "اهتزاز الوترين": "مهموس", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت حنجري احتكاكي مهموس" },
            "و": { "التسمية": "حرف الواو", "المخرج": "شفوي", "طريقة النطق": "لين", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت شفوي لين مجهور" },
            "ي": { "التسمية": "حرف الياء", "المخرج": "غاري", "طريقة النطق": "لين", "اهتزاز الوترين": "مجهور", "شكل اللسان": "غير مطبق", "ملخَّص": "صوت غاري لين مجهور" }
        };

        // 2. دالة البحث الرئيسية التي يطلبها الـ HTML
        function searchPhonetic() {
            let inputField = document.getElementById('charInput');
            let rawInput = inputField.value.trim();
            
            // إزالة التشكيل
            let cleanInput = rawInput.replace(/[\u064B-\u065F]/g, '');

            let resultSection = document.getElementById('resultSection');
            let resultDetails = document.getElementById('resultDetails');

            if (cleanInput === "") {
                inputField.focus();
                return;
            }

            // توحيد أشكال الهمزة
            if (['أ', 'إ', 'آ', 'ء', 'ؤ', 'ئ'].includes(cleanInput)) {
                cleanInput = 'أ';
            }

            let charData = phoneticsData[cleanInput];

            // إظهار قسم النتيجة
            resultSection.style.display = 'block';

            if (charData) {
                // تعبئة البيانات في البطاقات
                document.getElementById('charDisplay').innerText = cleanInput;
                document.getElementById('charName').innerText = charData["التسمية"];
                
                resultDetails.innerHTML = `
                    <div class="detail-card"><div class="detail-title">المخرج</div><div class="detail-value">${charData["المخرج"]}</div></div>
                    <div class="detail-card"><div class="detail-title">طريقة النطق</div><div class="detail-value">${charData["طريقة النطق"]}</div></div>
                    <div class="detail-card"><div class="detail-title">اهتزاز الوترين</div><div class="detail-value">${charData["اهتزاز الوترين"]}</div></div>
                    <div class="detail-card"><div class="detail-title">شكل اللسان</div><div class="detail-value">${charData["شكل اللسان"]}</div></div>
                    <div class="detail-card"><div class="detail-title">الملخَّص</div><div class="detail-value">${charData["ملخَّص"]}</div></div>
                `;

                // *** استدعاء دالة الرسم التوضيحي مع البيانات الدقيقة ***
                updateAnatomy(charData["المخرج"], charData["طريقة النطق"]);

            } else {
                document.getElementById('charDisplay').innerText = "؟";
                document.getElementById('charName').innerText = "عذراً، لم يتم العثور على النتيجة";
                resultDetails.innerHTML = `<div class="error-message">الرجاء إدخال حرف عربي صحيح من الصوامت.</div>`;
                
                // إخفاء النقاط على الرسم في حال كان الحرف غير صحيح
                document.querySelectorAll('.point').forEach(el => el.classList.remove('active'));
            }
        }

        // 3. دالة تفعيل الرسم التوضيحي (تم ربطها بدقة مع نصوص JSON الخاصة بك)
        function updateAnatomy(mokhraj, manner) {
            // إزالة التفعيل عن جميع النقاط
            document.querySelectorAll('.point').forEach(el => el.classList.remove('active'));

            let activeTargets = [];

            // مطابقة التسميات تماماً كما في ملف JSON الخاص بك
            if (mokhraj === 'حنجري') activeTargets.push('glottal');
            if (mokhraj === 'حلقي') activeTargets.push('pharyngeal');
            if (mokhraj === 'لهوي') activeTargets.push('uvular');
            if (mokhraj === 'طبقي') activeTargets.push('velar');
            if (mokhraj === 'غاري') activeTargets.push('palatal');
            
            if (mokhraj === 'لثوي') activeTargets.push('alveolar');
            
            if (mokhraj === 'أسناني لثوي') {
                activeTargets.push('teeth');
                activeTargets.push('alveolar');
            }
            if (mokhraj === 'بين أسناني') {
                activeTargets.push('teeth');
            }
            if (mokhraj === 'شفوي') {
                activeTargets.push('lips');
            }
            if (mokhraj === 'شفوي أسناني') {
                activeTargets.push('lips');
                activeTargets.push('teeth');
            }

            // التحقق من الصفة الأنفية (الخيشوم)
            if (manner.includes('أنفي')) {
                activeTargets.push('nasal');
            }

            // تفعيل النقاط المطابقة على الصورة
            activeTargets.forEach(target => {
                let point = document.getElementById(`pt-${target}`);
                if (point) point.classList.add('active');
            });
        }

        // دالة فتح وإغلاق القائمة الجانبية (لم أقم بتغييرها)
        function toggleMenu() {
            const sideMenu = document.getElementById('sideMenu');
            const overlay = document.getElementById('overlay');
            
            if(sideMenu && overlay) {
                sideMenu.classList.toggle('show');
                overlay.classList.toggle('show');
            }
        }

        // لتجنب الخطأ في حال لم يكن الـ overlay موجوداً في هذا الملف
        let overlayEl = document.getElementById('overlay');
        if(overlayEl) {
            overlayEl.addEventListener('click', toggleMenu);
        }
    </script>
</body>
</html>
