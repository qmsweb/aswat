<style>
    /* ========================================================= */
    /* تخصيص شاشات الجوال (عرض الشاشة 768 بكسل فأقل) */
    /* ========================================================= */
    @media (max-width: 768px) {
        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 60px;
        }

        /* إخفاء روابط سطح المكتب على الجوال */
        .nav-links {
            display: none;
        }

        /* توسيط الشعار في المنتصف تماماً */
        .brand {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            display: flex;
            align-items: center;
        }

        /* تنسيق زر القائمة (على اليمين) */
        .menu-toggle-btn {
            position: absolute;
            right: 15px; 
            z-index: 1001;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 !important; /* إلغاء الـ radius */
        }

        /* أيقونة القائمة باللون الأبيض */
        .menu-toggle-btn svg {
            fill: #ffffff !important;
            width: 32px;
            height: 32px;
        }

        /* --------------------------------------------------------- */
        /* تصميم القائمة الزجاجية (Blur) */
        /* --------------------------------------------------------- */
        
        /* إخفاء غطاء التعتيم القديم الخاص بالكمبيوتر */
        .drawer-overlay {
            display: none !important;
        }

        /* حاوية القائمة ملء الشاشة */
        .mobile-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            
            /* خلفية زجاجية ضبابية شفافة */
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            z-index: 1000;
            display: none; /* مخفية افتراضياً */
            opacity: 0;
            transition: opacity 0.4s ease; /* سرعة ظهور الخلفية */
            
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* إزالة أي تنسيقات قديمة أو انحناءات */
            box-shadow: none !important;
            border: none !important;
            border-radius: 0 !important; /* إلغاء الـ radius */
            padding: 0;
            margin: 0;
        }

        /* عرض القائمة عند النقر */
        .mobile-drawer.open {
            display: flex;
            opacity: 1;
        }

        /* --------------------------------------------------------- */
        /* زر الإغلاق (X) في الأعلى يساراً */
        /* --------------------------------------------------------- */
        .drawer-header {
            position: absolute;
            top: 25px;
            left: 25px; /* تم وضعه في اليسار */
            width: auto;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
        }

        /* إخفاء عنوان القائمة القديم */
        .drawer-title {
            display: none !important;
        }

        /* تصميم زر X */
        .close-drawer-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 45px;
            font-weight: 300;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            border-radius: 0 !important; /* إلغاء الـ radius */
        }

        /* إخفاء الفوتر القديم في الجوال */
        .drawer-footer {
            display: none !important;
        }

        /* --------------------------------------------------------- */
        /* نصوص الروابط (بدون خلفية والتوسيط) */
        /* --------------------------------------------------------- */
        .drawer-links {
            display: flex;
            flex-direction: column;
            align-items: center; /* توسيط العناصر في المنتصف */
            justify-content: center;
            gap: 35px;
            width: 100%;
            padding: 0;
            margin: 0;
            list-style: none !important; /* إزالة أي نقاط افتراضية */
        }

        /* إعداد حالة الروابط قبل الفتح (لعمل التأثير التتابعي) */
        .drawer-links a {
            background: transparent !important;
            color: #ffffff !important;
            font-size: 26px;
            font-weight: 500;
            text-decoration: none;
            text-align: center; /* توسيط النص */
            padding: 10px;
            display: block;
            border-radius: 0 !important; /* إلغاء الـ radius */
            
            /* إعدادات الحركة من الأسفل للأعلى */
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* تنفيذ الحركة عند فتح القائمة (ظهور في مكانه الطبيعي) */
        .mobile-drawer.open .drawer-links a {
            opacity: 1;
            transform: translateY(0);
        }

        /* أوقات التأخير لعمل التأثير التتابعي لكل عنصر */
        .mobile-drawer.open .drawer-links a:nth-child(1) { transition-delay: 0.1s; }
        .mobile-drawer.open .drawer-links a:nth-child(2) { transition-delay: 0.2s; }
        .mobile-drawer.open .drawer-links a:nth-child(3) { transition-delay: 0.3s; }
        /* إذا كان لديك روابط إضافية يمكنك إضافة nth-child(4) وهكذا بزيادة الوقت */
    }
</style>

<header class="top-navbar">
    <div class="container navbar-content">
        <div class="brand">
            <img src="https://github.com/qmsweb/aswat/raw/main/images/sawamet-logo.png" alt="شعار صوامت" class="brand-logo" style="max-height: 40px;">
        </div>
        
        <nav class="nav-links">
            <a href="https://sawamet.jassim.one/about.html">عن الأداة</a>
            <a href="https://rawafid.jassim.one/">روافد</a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfCzGsbQVEFWEBrl2jYWHs8-KISOJ-7A1-Vuao0FE27XPRLcA/viewform?usp=header" target="_blank">المقترحات</a>
        </nav>

        <button class="menu-toggle-btn" onclick="toggleMobileDrawer()" aria-label="قائمة التنقل">
            <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                <path d="M160 256h704a32 32 0 0 1 0 64H160a32 32 0 0 1 0-64zm192 192h512a32 32 0 0 1 0 64H352a32 32 0 0 1 0-64zm-192 192h704a32 32 0 0 1 0 64H160a32 32 0 0 1 0-64z"/>
            </svg>
        </button>
    </div>
</header>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeMobileDrawer()"></div>

<div class="mobile-drawer" id="mobileDrawer">
    <div class="drawer-header">
        <h2 class="drawer-title">القائمة الرئيسية</h2>
        <button class="close-drawer-btn" onclick="closeMobileDrawer()">×</button>
    </div>
    
    <nav class="drawer-links">
        <a href="https://sawamet.jassim.one/about.html">عن الأداة</a>
        <a href="https://rawafid.jassim.one/">روافد</a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfCzGsbQVEFWEBrl2jYWHs8-KISOJ-7A1-Vuao0FE27XPRLcA/viewform?usp=header" target="_blank">المقترحات</a>
    </nav>
    
    <div class="drawer-footer">
        أداة صوامت © 2026
    </div>
</div>

<script>
    // دالة فتح/إغلاق القائمة
    function toggleMobileDrawer() {
        var drawer = document.getElementById("mobileDrawer");
        drawer.classList.toggle("open");
    }

    // دالة إغلاق القائمة (عند الضغط على X أو الغطاء)
    function closeMobileDrawer() {
        var drawer = document.getElementById("mobileDrawer");
        if(drawer) drawer.classList.remove("open");
        
        var overlay = document.getElementById("drawerOverlay");
        if (overlay) overlay.style.display = 'none';
    }
</script>
