<style>
    /* ========================================================= */
    /* تخصيص شاشات الجوال (عرض الشاشة 768 بكسل فأقل) */
    /* ========================================================= */
    @media (max-width: 768px) {
        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 60px;
        }

        /* إخفاء روابط سطح المكتب على الجوال */
        .nav-links {
            display: none;
        }

        /* توسيط الشعار في المنتصف تماماً */
        .brand {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            display: flex;
            align-items: center;
        }

        /* تنسيق زر القائمة (على اليمين) */
        .menu-toggle-btn {
            position: absolute;
            right: 15px; 
            z-index: 1001;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* أيقونة القائمة باللون الأبيض */
        .menu-toggle-btn svg {
            fill: #ffffff; /* اللون الأبيض */
            width: 32px;
            height: 32px;
        }

        /* --------------------------------------------------------- */
        /* تصميم القائمة الزجاجية (Blur) */
        /* --------------------------------------------------------- */
        
        /* إخفاء غطاء التعتيم القديم الخاص بالكمبيوتر */
        .drawer-overlay {
            display: none !important;
        }

        /* حاوية القائمة ملء الشاشة */
        .mobile-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            
            /* خلفية زجاجية ضبابية شفافة */
            background-color: rgba(0, 0, 0, 0.4); /* لون داكن شفاف لإبراز النص الأبيض */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            z-index: 1000;
            display: none; /* مخفية افتراضياً */
            opacity: 0;
            transition: opacity 0.3s ease;
            
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* إزالة أي تنسيقات قديمة */
            box-shadow: none;
            border: none;
            padding: 0;
        }

        /* عرض القائمة عند النقر */
        .mobile-drawer.open {
            display: flex;
            opacity: 1;
        }

        /* --------------------------------------------------------- */
        /* زر الإغلاق (X) في الأعلى يساراً */
        /* --------------------------------------------------------- */
        .drawer-header {
            position: absolute;
            top: 25px;
            left: 25px; /* تم وضعه في اليسار */
            width: auto;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
        }

        /* إخفاء عنوان القائمة القديم */
        .drawer-title {
            display: none !important;
        }

        /* تصميم زر X */
        .close-drawer-btn {
            background: transparent;
            border: none;
            color: #ffffff; /* لون أبيض */
            font-size: 45px;
            font-weight: 300;
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }

        /* إخفاء الفوتر القديم في الجوال */
        .drawer-footer {
            display: none !important;
        }

        /* --------------------------------------------------------- */
        /* نصوص الروابط (بدون خلفية) */
        /* --------------------------------------------------------- */
        .drawer-links {
            display: flex;
            flex-direction: column;
            gap: 35px; /* مسافة بين العناصر */
            text-align: center;
            width: 100%;
        }

        .drawer-links a {
            background: transparent !important; /* بدون خلفية */
            color: #ffffff !important; /* لون النص أبيض */
            font-size: 26px; /* حجم خط كبير وواضح */
            font-weight: 500;
            text-decoration: none;
            padding: 10px;
            display: inline-block;
        }
    }
</style>

<header class="top-navbar">
    <div class="container navbar-content">
        <div class="brand">
            <img src="https://github.com/qmsweb/aswat/raw/main/images/sawamet-logo.png" alt="شعار صوامت" class="brand-logo" style="max-height: 40px;">
        </div>
        
        <nav class="nav-links">
            <a href="https://sawamet.jassim.one/about.html">عن الأداة</a>
            <a href="https://rawafid.jassim.one/">روافد</a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfCzGsbQVEFWEBrl2jYWHs8-KISOJ-7A1-Vuao0FE27XPRLcA/viewform?usp=header" target="_blank">المقترحات</a>
        </nav>

        <button class="menu-toggle-btn" onclick="toggleMobileDrawer()" aria-label="قائمة التنقل">
            <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                <path d="M160 256h704a32 32 0 0 1 0 64H160a32 32 0 0 1 0-64zm192 192h512a32 32 0 0 1 0 64H352a32 32 0 0 1 0-64zm-192 192h704a32 32 0 0 1 0 64H160a32 32 0 0 1 0-64z"/>
            </svg>
        </button>
    </div>
</header>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeMobileDrawer()"></div>

<div class="mobile-drawer" id="mobileDrawer">
    <div class="drawer-header">
        <h2 class="drawer-title">القائمة الرئيسية</h2>
        <button class="close-drawer-btn" onclick="closeMobileDrawer()">×</button>
    </div>
    
    <nav class="drawer-links">
        <a href="https://sawamet.jassim.one/about.html">عن الأداة</a>
        <a href="https://rawafid.jassim.one/">روافد</a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfCzGsbQVEFWEBrl2jYWHs8-KISOJ-7A1-Vuao0FE27XPRLcA/viewform?usp=header" target="_blank">المقترحات</a>
    </nav>
    
    <div class="drawer-footer">
        أداة صوامت © 2026
    </div>
</div>

<script>
    // دالة فتح/إغلاق القائمة
    function toggleMobileDrawer() {
        var drawer = document.getElementById("mobileDrawer");
        drawer.classList.toggle("open");
    }

    // دالة إغلاق القائمة (عند الضغط على X أو الغطاء)
    function closeMobileDrawer() {
        var drawer = document.getElementById("mobileDrawer");
        if(drawer) drawer.classList.remove("open");
        
        var overlay = document.getElementById("drawerOverlay");
        if (overlay) overlay.style.display = 'none';
    }
</script>
